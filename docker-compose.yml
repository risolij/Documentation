services:
  zensical:
    image: zensical-test
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./docs:/app/docs
      - ./zensical.toml:/app/zensical.toml
    environment:
      ZENSICAL_ENV: "development"
    command: ["serve", "--dev-addr", "0.0.0.0:8000"]
